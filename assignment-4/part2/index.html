<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="utf-8">    
    <style>
        * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px;
        font-family: sans-serif;
        background-color: #eee;
      }

      h1 {
        margin-top: 0;
      }

      .full-img {
        position: relative;
        display: inline-block;
      }

      .displayed-img {
        width: 640px;
      }

      .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgb(0 0 0 / 0);
      }

      .thumb-bar img {
        width: 120px;
        cursor: pointer;
        margin: 5px;
      }

      button {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 1;
        padding: 8px 12px;
        cursor: pointer;
      }
    </style>
    
</head>
<body> 
    <h1>Image gallery example</h1>

    <div class="full-img">
    <img
        class="displayed-img"
        src="https://mdn.github.io/shared-assets/images/examples/learn/gallery/pic1.jpg"
        alt="Closeup of a human eye" />
    <div class="overlay"></div>
    <button class="dark">Darken</button>
    </div>

    <div class="thumb-bar"></div>
    <script src="script.js"></script>
</body>
